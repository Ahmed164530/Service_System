data[car][service].parts.forEach(item=>{
results.innerHTML+=
createCard(item,true);
});


optionalParts.forEach(item=>{
results.innerHTML+=
createCard(item,false,true);
});


updateTotal();

};



function createCard(
item,
checked,
optional=false
){

return `
<div class="col-md-4 mb-4">

<div class="card shadow
${optional?'optional':''}">

<div class="card-body text-center">

<input
type="checkbox"
${checked?'checked':''}
data-price="${item.price}"
onchange="updateTotal()">

<h5 class="mt-3">
${item.part}
</h5>

<p>
${item.price} EGP
</p>

${
optional?
"<small class='text-warning'>Optional</small>"
:""
}

</div>

</div>

</div>
`;

}



function updateTotal(){

let car=carSelect.value;
let service=serviceSelect.value;

if(!data[car]||!data[car][service]) return;

let labor=
data[car][service].labor;

let consumables=
data[car][service].consumables;

let partsSum=0;

document
.querySelectorAll(
"input[type=checkbox]"
)
.forEach(cb=>{

if(cb.checked)
partsSum+=Number(
cb.dataset.price
);

});


let subtotal=
partsSum+
labor+
consumables;

let tax=
subtotal*0.14;

let total=
subtotal+tax;


document.getElementById(
"total"
).innerHTML=`

<b>Parts:</b>
${partsSum.toFixed(2)} EGP
<br>

<b>Labor:</b>
${labor} EGP
<br>

<b>Consumables:</b>
${consumables} EGP
<br>

<b>Tax:</b>
${tax.toFixed(2)} EGP

<hr>

<b>Total:</b>
${total.toFixed(2)} EGP

`;

}

</script>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
