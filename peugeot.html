/* مستهلكات ثابتة */

"دواسات للسيارة",
"تكييس السيارة",

"تشيحم الابواب"
];

];


const carSelect=document.getElementById('car');
const serviceSelect=document.getElementById('service');


/* =====================
   تحميل السيارات
===================== */
Object.keys(data).forEach(car=>{
carSelect.innerHTML+=`
<option value="${car}">${car}</option>`;
});

   عند تغيير السيارة
===================== */
carSelect.onchange=function(){

serviceSelect.innerHTML=`
<option>Select Service</option>`;

Object.keys(data[this.value]).forEach(service=>{
serviceSelect.innerHTML+=`
<option value="${service}">
${service} KM
</option>`;
});

};


/* =====================
   دالة الحساب الرئيسية
===================== */
function updateTotal(){

let car=carSelect.value;
let service=serviceSelect.value;

if(!data[car] || !data[car][service]) return;


let labor=
Number(
data[car][service].labor ||0
);

let consumables=
Number(
data[car][service].consumables ||0
);


/* مجموع القطع المختارة فقط */
let parts=0;

document.querySelectorAll(
"input[data-price]"
).forEach(item=>{

if(item.checked){
parts += Number(item.dataset.price);
}

});


/* ضريبة */
let tax=0.14;

/* قبل الضريبة */
let subtotal=
parts+
labor+
consumables;


/* الضريبة */
let partsTax=parts*tax;
let laborTax=labor*tax;
let consTax=consumables*tax;


/* بعد الضريبة */
let partsTotal=
parts+partsTax;

let laborTotal=
labor+laborTax;

let consumablesTotal=
consumables+consTax;


/* الإجمالي */
let total=
partsTotal+
laborTotal+
consumablesTotal;


/* الفاتورة */
document.getElementById('total').innerHTML=`

<div style='text-align:right;line-height:1.9;font-family:Arial'>

<h4>الفاتورة</h4>
<hr>

<b>قطع الغيار</b><br>
${parts.toFixed(2)} جنيه<br>

<span style='color:#dc3545;font-weight:bold'>
ضريبة:
</span>
${partsTax.toFixed(2)} جنيه<br>

= ${partsTotal.toFixed(2)} جنيه

<br><br>


<b>المصنعية</b><br>
${labor.toFixed(2)} جنيه<br>

<span style='color:#dc3545;font-weight:bold'>
ضريبة:
</span>
${laborTax.toFixed(2)} جنيه<br>

= ${laborTotal.toFixed(2)} جنيه

<br><br>


<b>المستهلكات</b><br>
${consumables.toFixed(2)} جنيه<br>

<span style='color:#dc3545;font-weight:bold'>
ضريبة:
</span>
${consTax.toFixed(2)} جنيه<br>

= ${consumablesTotal.toFixed(2)} جنيه

<hr>

<h5>
الإجمالي قبل الضريبة:
${subtotal.toFixed(2)} جنيه
</h5>

<h3>
الإجمالي شامل الضريبة:
${total.toFixed(2)} جنيه
</h3>

</div>

`;

}


/* =====================
  عند تغيير الصيانة
===================== */
serviceSelect.onchange=function(){

let car=carSelect.value;
let service=this.value;

let partsSection=
document.getElementById(
'partsSection'
);

let reviewSection=
document.getElementById(
'reviewSection'
);

let consumablesSection=
document.getElementById(
'consumablesSection'
);


partsSection.innerHTML='';
reviewSection.innerHTML='';
consumablesSection.innerHTML='';


/* القطع الأساسية */
data[car][service].parts.forEach(item=>{

partsSection.innerHTML+=
createPart(
item,
true
);

});


/* الاختيارية */
partsSection.innerHTML+=`
<div class='optional-title'>
قطع غيار اختيارية
</div>`;


optionalParts.forEach(item=>{

partsSection.innerHTML+=
createPart(
item,
false,
true
);

});


/* المراجعات */
reviewItems.forEach(item=>{
reviewSection.innerHTML+=
fixedBox(item);
});


/* المستهلكات */
fixedConsumables.forEach(item=>{
consumablesSection.innerHTML+=
fixedBox(item);
});


updateTotal();

};


/* =====================
   إنشاء قطعة غيار
===================== */
function createPart(
item,
checked,
optional=false
){

return `

<div class='item-box ${optional?'optional':''}'>

<input
 type='checkbox'
 ${checked?'checked':''}
 data-price='${item.price}'
 onchange='updateTotal()'>

<h6 class='mt-3'>
${item.part}
</h6>

<b>
${item.price} EGP
</b>

${optional ?
"<br><small class='text-warning'>Optional</small>"
:''}

</div>

`;

}


/* =====================
   بوكس ثابت
===================== */
function fixedBox(text){

return `

<div class='item-box fixed-box'>

<input
checked
disabled
type='checkbox'>

<h6 class='mt-3 mb-0'>
✔ ${text}
</h6>

</div>

`;

}
