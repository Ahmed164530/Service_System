<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>نظام الصيانة الذكي</title>

<style>


.navbar{
box-shadow:0 2px 15px rgba(0,0,0,.12);
}

.navbar-brand{
font-size:24px;
font-weight:bold;
}

.nav-link{
padding:10px 18px !important;
border-radius:8px;
font-weight:600;
transition:.3s;
}

.nav-link:hover{
background:#198754;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:25px;
}

body{
    font-family: Arial;
    background:#f2f2f2;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    margin:0;
}

.container{
    background:#fff;
    padding:25px;
    border-radius:12px;
    width:360px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

h2{
    text-align:center;
    margin-bottom:20px;
}

select,input,button{
    width:100%;
    padding:10px;
    margin-top:10px;
    border-radius:8px;
    border:1px solid #ccc;
    font-size:16px;
}

button{
    background:#28a745;
    color:#fff;
    border:none;
    cursor:pointer;
}

button:hover{
    background:#1e7e34;
}

.result{
    margin-top:15px;
    text-align:center;
    font-weight:bold;
    font-size:18px;
}
</style>
</head>

<body>

<div class="container">

<h2>نظام حساب الصيانة</h2>

<select id="carSelect">
    <option value="peugeot301">بيجو 301</option>
    <option value="peugeot508">بيجو 508</option>
    <option value="suzuki">سوزوكي</option>
</select>

<input type="number" id="kmInput" placeholder="ادخل الكيلومترات">

<button onclick="calculate()">احسب الصيانة</button>

<div class="result" id="result"></div>

</div>



<script>

// جدول الصيانة الحقيقي
const data = {
    "peugeot301": [10, 20, 30, 60],
    "peugeot508": [10, 20, 40, 90],
    "suzuki": [10, 20, 40]
};

function calculate(){

    let car = document.getElementById("carSelect").value;
    let km = Number(document.getElementById("kmInput").value);

    if(!km || km <= 0){
        document.getElementById("result").innerHTML = "ادخل كيلومترات صحيحة";
        return;
    }

    let services = data[car];

    let best = null;

    // نبدأ من الأكبر للأصغر عشان نجيب أكبر صيانة تنفع
    for(let i = services.length - 1; i >= 0; i--){
        if(km % services[i] === 0){
            best = services[i];
            break;
        }
    }

    document.getElementById("result").innerHTML =
        best ? ("أنسب صيانة: " + best + " ألف كم")
             : "لا يوجد تطابق مباشر";
}

</script>

</body>
</html>
