}

text-align:center;

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">

<a class="navbar-brand" href="index.html">

</li>

</ul>

<!-- CONTENT -->
<div class="container-box">

<h2>نظام حساب الصيانة</h2>

<select id="carSelect">
    <option value="peugeot301">301/307/408</option>
    <option value="peugeot508">508/208/308/2008/3008</option>
    <option value="suzuki">Suzuki</option>
</select>

<input type="number" id="kmInput" placeholder="ادخل الكيلومترات">

<button onclick="calculate()">احسب الصيانة</button>

<div class="result" id="result"></div>

</div>

<script>

// بيانات الصيانة
const data = {
    "peugeot301": [10, 20, 30, 60],
    "peugeot508": [10, 20, 40, 90],
    "suzuki": [10, 20, 40]
};

function calculate(){

    let car = document.getElementById("carSelect").value;
    let km = Number(document.getElementById("kmInput").value);

    if(!km || km <= 0){
        document.getElementById("result").innerHTML = "ادخل كيلومترات صحيحة";
        return;
    }

    let services = data[car];

    let best = null;

    for(let i = services.length - 1; i >= 0; i--){
        if(km % services[i] === 0){
            best = services[i];
            break;
        }
    }

    document.getElementById("result").innerHTML =
        best ? ("أنسب صيانة: " + best + " ألف كم")
             : "لا يوجد تطابق مباشر";
}

</script>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
