/* مراجعات ثابتة */
const reviewItems=[
"فحص الفرامل",
"فحص العفشة",
"فحص الكاوتش",
"كشف كمبيوتر",
"مراجعة انوار"
];

/* مستهلكات ثابتة */
const fixedConsumables=[
"دواسات للسيارة",
"تكييس السيارة",
"اسبريه للفرامل",
"تشيحم الابواب",

];

/* قطع غيار اختيارية تحت الأساسية */
const optionalParts=[
{part:"اسبريه فوم",price:100},
{part:"مياه مساحات",price:30}
];

const carSelect=document.getElementById('car');
const serviceSelect=document.getElementById('service');

Object.keys(data).forEach(car=>{
carSelect.innerHTML+=`<option value="${car}">${car}</option>`;
});

carSelect.onchange=function(){
serviceSelect.innerHTML=`<option>Select Service</option>`;

Object.keys(data[this.value]).forEach(s=>{
serviceSelect.innerHTML+=`
<option value="${s}">${s} KM</option>`;
});
}

serviceSelect.onchange=function(){
let car=carSelect.value;
let service=this.value;

let parts=document.getElementById('partsSection');
let reviews=document.getElementById('reviewSection');
let cons=document.getElementById('consumablesSection');

parts.innerHTML='';
reviews.innerHTML='';
cons.innerHTML='';

/* قطع غيار اساسية */
data[car][service].parts.forEach(item=>{
parts.innerHTML+=createPart(item,true);
});

/* عنوان القطع الاختيارية */
parts.innerHTML+=`
<div class='optional-title'>قطع غيار اختيارية</div>`;

/* قطع غيار اختيارية تحت الأساسية */
optionalParts.forEach(item=>{
parts.innerHTML+=createPart(item,false,true);
});

/* مراجعات */
reviewItems.forEach(item=>{
reviews.innerHTML+=fixedBox(item);
});

/* مستهلكات ثابتة */
fixedConsumables.forEach(item=>{
cons.innerHTML+=fixedBox(item);
});

updateTotal();
}

function createPart(item,checked,optional=false){
return `
<div class='item-box ${optional?'optional':''}'>
<input
${checked?'checked':''}
type='checkbox'
data-price='${item.price}'
onchange='updateTotal()'>

<h6 class='mt-3'>${item.part}</h6>
<b>${item.price} EGP</b>
${optional?"<br><small class='text-warning'>Optional</small>":''}
</div>`;
}

function fixedBox(text){
return `
<div class='item-box fixed-box'>
<input checked disabled type='checkbox'>
<h6 class='mt-3 mb-0'>✔ ${text}</h6>
</div>`;
}


function updateTotal(){

let car = carSelect.value;
let service = serviceSelect.value;

if(!data[car] || !data[car][service]) return;

let labor = data[car][service].labor;
let consumables = data[car][service].consumables;


/* مجموع قطع الغيار المختارة فقط */
let parts = 0;

document.querySelectorAll('input[data-price]').forEach(item=>{

if(item.checked){
parts += parseFloat(item.dataset.price);
}

});


/* الضريبة */
let taxRate = 0.14;


/* قبل الضريبة */
let subtotal = labor + consumables + parts;


/* الضريبة لكل بند */
let partsTax = parts * taxRate;
let laborTax = labor * taxRate;
let consTax = consumables * taxRate;


/* بعد الضريبة */
let partsTotal = parts + partsTax;
let laborTotal = labor + laborTax;
let consumablesTotal = consumables + consTax;


/* الإجمالي النهائي */
let total = partsTotal + laborTotal + consumablesTotal;



document.getElementById('total').innerHTML = `

<div style="text-align:right;line-height:1.9;font-family:Arial">

<h4>الفاتورة</h4>
<hr>

<b>قطع الغيار المختارة</b><br>
${parts.toFixed(2)} جنيه<br>

<span style="color:#dc3545;font-weight:bold">
ضريبة:
</span>
${partsTax.toFixed(2)} جنيه<br>

= ${partsTotal.toFixed(2)} جنيه

<br><br>


<b>المصنعية</b><br>
${labor.toFixed(2)} جنيه<br>

<span style="color:#dc3545;font-weight:bold">
ضريبة:
</span>
${laborTax.toFixed(2)} جنيه<br>

= ${laborTotal.toFixed(2)} جنيه

<br><br>


<b>المستهلكات</b><br>
${consumables.toFixed(2)} جنيه<br>

<span style="color:#dc3545;font-weight:bold">
ضريبة:
</span>
${consTax.toFixed(2)} جنيه<br>

= ${consumablesTotal.toFixed(2)} جنيه


<hr>

<h5>
الإجمالي قبل الضريبة :
${subtotal.toFixed(2)} جنيه
</h5>

<h3 >
الإجمالي شامل الضريبة :
${total.toFixed(2)} جنيه
</h3>

</div>

`;

}
