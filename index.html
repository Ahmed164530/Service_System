<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>CDCM Maintenance System</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
margin:0;
font-family:Arial;
}

.bg-slider {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -1;
}

.bg-slide {
  position: absolute;
  width: 100%;
  height: 100%;
  background-size: cover;
  background-position: center;
  opacity: 0;
  animation: fadeSlide 25s infinite;
}

.slide1 {
  background-image: url('p.jpg');
  animation-delay: 0s;
}

.slide2 {
  background-image: url('p2.jpg');
  animation-delay: 5s;
}

.slide3 {
  background-image: url('p3.jpg');
  animation-delay: 10s;
}

.slide4 {
  background-image: url('p4.jpg');
  animation-delay: 15s;
}

.slide5 {
  background-image: url('p5.jpg');
  animation-delay: 20s;
}

/* الأنيميشن */
@keyframes fadeSlide {
  0%   { opacity: 0; }
  5%   { opacity: 1; }
  20%  { opacity: 1; }
  25%  { opacity: 0; }
  100% { opacity: 0; }
}

.overlay {
  position: fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background: rgba(0,0,0,0.4);
  z-index:-1;
}

.navbar{
box-shadow:0 2px 15px rgba(0,0,0,.12);
}

.navbar-brand{
font-size:24px;
font-weight:bold;
}

.nav-link{
padding:10px 18px !important;
border-radius:8px;
font-weight:600;
transition:.3s;
}

.nav-link:hover{
background:#198754;
}

.header{
display:flex;
justify-content:space-between;
align-items:center;
margin-top:25px;
}

.logo{
width:120px;
}

.card{
border:none;
border-radius:18px;
}

.card:hover{
transform:translateY(-5px);
transition:.3s;
}

.optional{
border:2px dashed orange;
}

.total-box{
background:#198754;
color:#fff;
padding:20px;
border-radius:14px;
font-size:20px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

</style>
</head>

<body>

<!-- الخلفية -->
<div class="bg-slider">
  <div class="bg-slide slide1"></div>
  <div class="bg-slide slide2"></div>
  <div class="bg-slide slide3"></div>
  <div class="bg-slide slide4"></div>
  <div class="bg-slide slide5"></div>
</div>

<div class="overlay"></div>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
<div class="container">

<a class="navbar-brand" href="index.html">
CDCM Maintenance System
</a>

<button class="navbar-toggler"
type="button"
data-bs-toggle="collapse"
data-bs-target="#menu">
<span class="navbar-toggler-icon"></span>
</button>

<div class="collapse navbar-collapse" id="menu">
<ul class="navbar-nav ms-auto">

<li class="nav-item">

</li>

</li>

</ul>
</div>

</div>
</nav>

<div class="container">

<div class="header">

</div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
